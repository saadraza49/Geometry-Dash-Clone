<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geometry Dash - Web Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A lightweight Geometry Dash clone built with HTML5 Canvas and vanilla JavaScript.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Game Canvas -->
  <canvas id="gameCanvas" width="800" height="480"></canvas>

  <!-- In-Game HUD -->
  <div id="hud">
    <div class="hud-text" id="hudAttempt">Attempt 1</div>
    <div class="progress-container">
      <div class="progress-bar" id="hudProgress"></div>
    </div>
    <div class="hud-text" id="hudLevelName">Stereo Madness</div>
  </div>

  <!-- Main Menu Overlay -->
  <div id="mainMenu" class="overlay active">
    <div class="title-container">
      <h1 class="gd-title">Geometry Dash</h1>
    </div>
    <div class="menu-buttons">
      <button id="playBtn" class="gd-play-btn">
        <div class="play-triangle"></div>
      </button>
    </div>
  </div>

  <!-- Level Select Overlay -->
  <div id="levelSelect" class="overlay">
    <div class="level-header">
      <button id="backBtn" class="back-btn">← Back</button>
      <div style="color:white; font-size: 1.5rem; font-weight:700;">Select Level</div>
      <div style="width: 80px;"></div> <!-- spacer -->
    </div>
    <div class="level-slider-container">
      <button id="scrollLeftBtn" class="scroll-btn">◄</button>
      <div id="levelSlider" class="level-slider">
        <!-- Level cards injected by JS -->
      </div>
      <button id="scrollRightBtn" class="scroll-btn">►</button>
    </div>
  </div>

  <!-- Death Screen Overlay -->
  <div id="deathScreen" class="overlay">
    <h2>Level Failed</h2>
    <div class="attempt-text" id="deathAttempt">Attempt 1</div>
    <div class="action-text">Click or Press Space to Restart</div>
    <button id="deathQuitBtn" class="gd-quit-btn mt-4">Return to Levels</button>
  </div>

  <!-- Pause Screen Overlay -->
  <div id="pauseScreen" class="overlay">
    <h2>PAUSED</h2>
    <div class="pause-menu-buttons">
      <button id="resumeBtn" class="gd-btn gd-btn-green">Resume</button>
      <button id="pauseQuitBtn" class="gd-btn gd-btn-red">Quit to Levels</button>
    </div>
  </div>

  <!-- Level Complete Overlay -->
  <div id="completeScreen" class="overlay">
    <h2>Level Complete!</h2>
    <div class="stats-card">
      <p id="completeLevelName">Stereo Madness</p>
      <p id="completeAttempts">Attempts: 1</p>
      <p id="completeJumps">Jumps: 0</p>
    </div>
    <button id="menuReturnBtn" class="back-btn" style="padding: 15px 30px; font-size: 1.5rem;">Continue</button>
  </div>

  <!-- Scripts -->
  <script src="levels.js"></script>
  <script src="game.js"></script>
</body>
</html>
